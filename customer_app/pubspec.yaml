name: fixly_ai
description: "Fixly AI - AI-powered service marketplace app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.1.2
  lottie: ^3.3.1

  # State Management
  provider: ^6.1.4

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.0

  # Payments
  flutter_stripe: ^11.4.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.12.1

  # Networking
  http: ^1.3.0
  dio: ^5.8.0+1

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.4
  permission_handler: ^11.4.0
  speech_to_text: ^7.0.0
  json_annotation: ^4.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  mockito: ^5.4.6
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  # assets:
  #   - assets/images/
  #   - assets/animations/
  #   - assets/icons/
